const reduceToSingle = (n) => {
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
    n = String(n).split('').reduce((a, b) => a + parseInt(b), 0);
  }
  return n;
};
const sumDigits = (n) => String(n).split('').reduce((a, b) => a + parseInt(b), 0);

const calculateNumerology = (year, month, day, today) => {
  const lifePath = reduceToSingle(sumDigits(year) + sumDigits(month) + sumDigits(day));
  const personalYear = reduceToSingle(sumDigits(today.getFullYear()) + parseInt(month) + parseInt(day));
  const personalDay = reduceToSingle(sumDigits(today.getFullYear()) + (today.getMonth() + 1) + today.getDate() + parseInt(month) + parseInt(day));
  return { lifePath, personalYear, personalDay };
};

const calculateDayPillar = (year, month, day) => {
  const ref = new Date(1900, 0, 1);
  const target = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
  const dayDiff = Math.floor((target - ref) / 86400000);
  const idx = ((dayDiff + 10) % 60 + 60) % 60;
  return { stem: heavenlyStems[idx % 10], branch: earthlyBranches[idx % 12], idx };
};

const calculateYearPillar = (year, month, day) => {
  const adjustedYear = (parseInt(month) < 2 || (parseInt(month) === 2 && parseInt(day) < 4)) ? parseInt(year) - 1 : parseInt(year);
  const yearDiff = ((adjustedYear - 1984) % 60 + 60) % 60;
  return { stem: heavenlyStems[yearDiff % 10], branch: earthlyBranches[yearDiff % 12], idx: yearDiff };
};

const elementRelation = (from, to) => {
  if (from === to) return 'same';
  const productive = { '木': '火', '火': '土', '土': '金', '金': '水', '水': '木' };
  if (productive[from] === to) return 'produces';
  if (productive[to] === from) return 'producedBy';
  const destructive = { '木': '土', '土': '水', '水': '火', '火': '金', '金': '木' };
  if (destructive[from] === to) return 'destroys';
  if (destructive[to] === from) return 'destroyedBy';
  return 'unknown';
};

const calculateMonthPillar = (year, month, day) => {
  const m = parseInt(month);
  const d = parseInt(day);
  const setsuMonth = d >= 5 ? m : (m === 1 ? 12 : m - 1);
  const branchByMonth = {
    2: '寅', 3: '卯', 4: '辰', 5: '巳', 6: '午', 7: '未',
    8: '申', 9: '酉', 10: '戌', 11: '亥', 12: '子', 1: '丑'
  };
  const monthBranch = branchByMonth[setsuMonth];
  const yearPillar = calculateYearPillar(year, month, day);
  const yearStemIdx = heavenlyStems.indexOf(yearPillar.stem);
  const tigerStemMap = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0];
  const tigerStemIdx = tigerStemMap[yearStemIdx];
  const offset = setsuMonth >= 2 ? setsuMonth - 2 : setsuMonth + 10;
  const monthStemIdx = (tigerStemIdx + offset) % 10;
  return { stem: heavenlyStems[monthStemIdx], branch: monthBranch };
};

const calculateChuushinsei = (dayStem, monthBranch) => {
  const targetStem = branchHiddenStem[monthBranch];
  if (!targetStem) return '貫索星';
  const dayMeta = stemMeta[dayStem];
  const monMeta = stemMeta[targetStem];
  const sameYang = dayMeta.yang === monMeta.yang;
  const rel = elementRelation(dayMeta.element, monMeta.element);
  if (rel === 'same')        return sameYang ? '貫索星' : '石門星';
  if (rel === 'produces')    return sameYang ? '鳳閣星' : '調舒星';
  if (rel === 'destroys')    return sameYang ? '禄存星' : '司禄星';
  if (rel === 'destroyedBy') return sameYang ? '車騎星' : '牽牛星';
  if (rel === 'producedBy')  return sameYang ? '龍高星' : '玉堂星';
  return '貫索星';
};

const calculateMoonSign = (year, month, day, hour, minute) => {
  const Y = parseInt(year), M = parseInt(month), D = parseInt(day);
  const isUnknownTime = hour === 'unknown' || hour === '';
  const H = isUnknownTime ? 12 : parseInt(hour);
  const Mi = isUnknownTime ? 0 : parseInt(minute);
  let y = Y, m = M;
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  const JD = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + D + B - 1524.5 + (H + Mi/60 - 9) / 24;
  const T = (JD - 2451545.0) / 36525;
  let L = 218.3164477 + 481267.88123421 * T;
  const Mm = 134.9633964 + 477198.8675055 * T;
  const Ms = 357.5291092 + 35999.0502909 * T;
  const Dm = 297.8501921 + 445267.1114034 * T;
  const F = 93.2720950 + 483202.0175233 * T;
  const rad = Math.PI / 180;
  L += 6.289 * Math.sin(Mm * rad);
  L += -1.274 * Math.sin((Mm - 2*Dm) * rad);
  L += 0.658 * Math.sin(2*Dm * rad);
  L += 0.214 * Math.sin(2*Mm * rad);
  L += -0.186 * Math.sin(Ms * rad);
  L += -0.114 * Math.sin(2*F * rad);
  L = ((L % 360) + 360) % 360;

    { name: '山羊座', emoji: '♑' }, { name: '水瓶座', emoji: '♒' }, { name: '魚座', emoji: '♓' }
  ];

};

const FormattedText = ({ text, className = '' }) => {
  if (!text) return null;
  const paragraphs = text.split(/\n\s*\n/);
  return (
    <div className={`space-y-6 ${className}`}>
      {paragraphs.map((paragraph, idx) => (
        <div key={idx} className="text-[15px] leading-[2.0] text-stone-700">
          {paragraph.split('\n').map((line, lIdx) => (
            <React.Fragment key={lIdx}>
              {line}
              {lIdx !== paragraph.split('\n').length - 1 && <br />}
            </React.Fragment>
          ))}
        </div>
      ))}
    </div>
  );
};

        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;

                          </div>
                          <div className="bg-white/70 p-2 rounded-xl">
                            <p className="text-[10px] text-stone-500">日柱（核）</p>
                            <p className="text-lg font-bold font-serif-jp text-orange-600">{readingData.dayPillar.stem}{readingData.dayPillar.branch}</p>
                          </div>
                        </div>
                        <p className="text-[10px] text-center mt-2 text-stone-500">今日の干支: {readingData.todayDayPillar.stem}{readingData.todayDayPillar.branch}</p>
                      </div>
                    )}
                    {detailModal === 'sanmeigaku' && (
                      <div className="mb-4 p-4 bg-gradient-to-br from-rose-50 to-pink-50 rounded-2xl border-2 border-rose-200 text-center">
                        <p className="text-xs font-bold text-rose-600 mb-2 tracking-widest">⭐ あなたの主星</p>
                        <p className="text-3xl mb-1">{readingData.mainStar.element}</p>
                        <p className="text-xl font-bold font-serif-jp text-stone-800">{readingData.mainStar.name}</p>
                        <p className="text-[10px] text-stone-500 mt-1">{readingData.mainStar.meaning}</p>
                      </div>
                    )}
                    {detailModal === 'horoscope' && (
                      <div className="mb-4 p-4 bg-gradient-to-br from-orange-50 to-yellow-50 rounded-2xl border-2 border-orange-200">
                        <div className="grid grid-cols-2 gap-2 text-center">
                          <div className="bg-white/80 p-3 rounded-xl">
                            <p className="text-[10px] font-bold text-orange-600 mb-1">☀️ 太陽星座</p>
                            <p className="text-3xl">{readingData.sunSign.emoji}</p>
                            <p className="text-base font-bold font-serif-jp text-stone-800">{readingData.sunSign.name}</p>
                          </div>
                          <div className="bg-white/80 p-3 rounded-xl">
                            <p className="text-[10px] font-bold text-blue-500 mb-1">🌙 月星座</p>
                            <p className="text-3xl">{readingData.moonSign.emoji}</p>
                            <p className="text-base font-bold font-serif-jp text-stone-800">{readingData.moonSign.name}</p>
                            {readingData.moonSign.approximate && <p className="text-[8px] text-stone-400 mt-0.5">※出生時間不明のため概算</p>}
                          </div>
                        </div>
                      </div>
                    )}
                    {detailModal === 'numerology' && (
                      <div className="mb-4 p-4 bg-gradient-to-br from-pink-50 to-rose-50 rounded-2xl border-2 border-pink-200">
                        <p className="text-xs font-bold text-pink-600 mb-2 tracking-widest text-center">🔢 あなたの数秘</p>
                        <div className="grid grid-cols-3 gap-2 text-center">
                          <div className="bg-white/70 p-2 rounded-xl">
                            <p className="text-[9px] text-stone-500">本質</p>
                            <p className="text-2xl font-bold text-pink-600">{readingData.numerology.lifePath}</p>
                          </div>
                          <div className="bg-white/70 p-2 rounded-xl">
                            <p className="text-[9px] text-stone-500">今年</p>
                            <p className="text-2xl font-bold text-orange-500">{readingData.numerology.personalYear}</p>
                          </div>
                          <div className="bg-white/70 p-2 rounded-xl">
                            <p className="text-[9px] text-stone-500">今日</p>
                            <p className="text-2xl font-bold text-rose-500">{readingData.numerology.personalDay}</p>
                          </div>
                        </div>
                        <p className="text-[10px] text-center mt-2 text-stone-500">本質: {numerologyMeanings[readingData.numerology.lifePath]?.keyword}</p>
                      </div>
                    )}
                    <FormattedText text={detailContent}/>
                  </>
                )}
              </div>
              <div className="p-4 border-t-2 border-orange-100">
                <button onClick={() => setDetailModal(null)}
                  className="w-full py-3 rounded-2xl font-bold text-white shadow-md"
                  style={{background: 'linear-gradient(135deg, #fb923c, #ec4899)'}}>閉じる</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
