<style>
  body {
    margin: 0;
    font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(135deg, #fff7ed 0%, #fef3c7 50%, #ffedd5 100%);
    min-height: 100vh;
  }
  .font-serif-jp { font-family: 'Noto Serif JP', serif; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }

  @keyframes float-slow {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }
  .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  .animate-sparkle { animation: sparkle 2s ease-in-out infinite; }

  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .animate-spin-slow { animation: spin-slow 60s linear infinite; }

  @keyframes pulse-soft {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .animate-pulse-soft { animation: pulse-soft 3s ease-in-out infinite; }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer-text {
    background: linear-gradient(90deg, #fb923c, #fbbf24, #f97316, #fbbf24, #fb923c);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s linear infinite;
  }

  @keyframes bounce-soft {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .animate-bounce-soft { animation: bounce-soft 2s ease-in-out infinite; }

  .sparkle-bg::before, .sparkle-bg::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,237,153,0.9), transparent);
    pointer-events: none;
  }
  .sparkle-bg::before {
    top: 10%; left: 15%; width: 80px; height: 80px;
    animation: sparkle 3s ease-in-out infinite;
  }
  .sparkle-bg::after {
    bottom: 15%; right: 10%; width: 60px; height: 60px;
    animation: sparkle 4s ease-in-out infinite 1s;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #fff7ed; }
  ::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 4px; }
</style>
</head>

const SUPABASE_URL = 'https://vgtacqcfyqkwdxpsnsye.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wCUlOADnMJbjNQrCeeihtw_SGc-Nhph';

const supabaseFetch = async (method, id, value) => {
  const url = `${SUPABASE_URL}/rest/v1/mackey_settings`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
  if (method === 'GET') {
    const res = await fetch(`${url}?select=*`, { headers });
    return res.json();
  }
  if (method === 'UPSERT') {
    const res = await fetch(url, {
      method: 'POST',
      headers: { ...headers, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ id, value, updated_at: new Date().toISOString() })
    });
    return res.ok;
  }
};

// Supabaseから全設定を読み込む
const loadSettingsFromSupabase = async () => {
  try {
    const rows = await supabaseFetch('GET');
    const result = {};
    if (Array.isArray(rows)) {
      rows.forEach(row => { result[row.id] = row.value; });
    }
    return result;
  } catch(e) {
    console.error('Supabase load error:', e);
    return {};
  }
};

// Supabaseに設定を保存する
const saveSettingToSupabase = async (id, value) => {
  try {
    return await supabaseFetch('UPSERT', id, value);
  } catch(e) {
    console.error('Supabase save error:', e);
    return false;
  }
};

const reduceToSingle = (n) => {
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
    n = String(n).split('').reduce((a, b) => a + parseInt(b), 0);
  }
  return n;
};
const sumDigits = (n) => String(n).split('').reduce((a, b) => a + parseInt(b), 0);

const calculateNumerology = (year, month, day, today) => {
  const lifePath = reduceToSingle(sumDigits(year) + sumDigits(month) + sumDigits(day));
  const personalYear = reduceToSingle(sumDigits(today.getFullYear()) + parseInt(month) + parseInt(day));
  const personalDay = reduceToSingle(sumDigits(today.getFullYear()) + (today.getMonth() + 1) + today.getDate() + parseInt(month) + parseInt(day));
  return { lifePath, personalYear, personalDay };
};

const calculateDayPillar = (year, month, day) => {
  const ref = new Date(1900, 0, 1);
  const target = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
  const dayDiff = Math.floor((target - ref) / 86400000);
  const idx = ((dayDiff + 10) % 60 + 60) % 60;
  return { stem: heavenlyStems[idx % 10], branch: earthlyBranches[idx % 12], idx };
};

const calculateYearPillar = (year, month, day) => {
  const adjustedYear = (parseInt(month) < 2 || (parseInt(month) === 2 && parseInt(day) < 4)) ? parseInt(year) - 1 : parseInt(year);
  const yearDiff = ((adjustedYear - 1984) % 60 + 60) % 60;
  return { stem: heavenlyStems[yearDiff % 10], branch: earthlyBranches[yearDiff % 12], idx: yearDiff };
};

const elementRelation = (from, to) => {
  if (from === to) return 'same';
  const productive = { '木': '火', '火': '土', '土': '金', '金': '水', '水': '木' };
  if (productive[from] === to) return 'produces';
  if (productive[to] === from) return 'producedBy';
  const destructive = { '木': '土', '土': '水', '水': '火', '火': '金', '金': '木' };
  if (destructive[from] === to) return 'destroys';
  if (destructive[to] === from) return 'destroyedBy';
  return 'unknown';
};

const calculateMonthPillar = (year, month, day) => {
  const m = parseInt(month);
  const d = parseInt(day);
  const setsuMonth = d >= 5 ? m : (m === 1 ? 12 : m - 1);
  const branchByMonth = {
    2: '寅', 3: '卯', 4: '辰', 5: '巳', 6: '午', 7: '未',
    8: '申', 9: '酉', 10: '戌', 11: '亥', 12: '子', 1: '丑'
  };
  const monthBranch = branchByMonth[setsuMonth];
  const yearPillar = calculateYearPillar(year, month, day);
  const yearStemIdx = heavenlyStems.indexOf(yearPillar.stem);
  const tigerStemMap = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0];
  const tigerStemIdx = tigerStemMap[yearStemIdx];
  const offset = setsuMonth >= 2 ? setsuMonth - 2 : setsuMonth + 10;
  const monthStemIdx = (tigerStemIdx + offset) % 10;
  return { stem: heavenlyStems[monthStemIdx], branch: monthBranch };
};

const calculateChuushinsei = (dayStem, monthBranch) => {
  const targetStem = branchHiddenStem[monthBranch];
  if (!targetStem) return '貫索星';
  const dayMeta = stemMeta[dayStem];
  const monMeta = stemMeta[targetStem];
  const sameYang = dayMeta.yang === monMeta.yang;
  const rel = elementRelation(dayMeta.element, monMeta.element);
  if (rel === 'same')        return sameYang ? '貫索星' : '石門星';
  if (rel === 'produces')    return sameYang ? '鳳閣星' : '調舒星';
  if (rel === 'destroys')    return sameYang ? '禄存星' : '司禄星';
  if (rel === 'destroyedBy') return sameYang ? '車騎星' : '牽牛星';
  if (rel === 'producedBy')  return sameYang ? '龍高星' : '玉堂星';
  return '貫索星';
};

const calculateMoonSign = (year, month, day, hour, minute) => {
  const Y = parseInt(year), M = parseInt(month), D = parseInt(day);
  const isUnknownTime = hour === 'unknown' || hour === '';
  const H = isUnknownTime ? 12 : parseInt(hour);
  const Mi = isUnknownTime ? 0 : parseInt(minute);
  let y = Y, m = M;
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  const JD = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + D + B - 1524.5 + (H + Mi/60 - 9) / 24;
  const T = (JD - 2451545.0) / 36525;
  let L = 218.3164477 + 481267.88123421 * T;
  const Mm = 134.9633964 + 477198.8675055 * T;
  const Ms = 357.5291092 + 35999.0502909 * T;
  const Dm = 297.8501921 + 445267.1114034 * T;
  const F = 93.2720950 + 483202.0175233 * T;
  const rad = Math.PI / 180;
  L += 6.289 * Math.sin(Mm * rad);
  L += -1.274 * Math.sin((Mm - 2*Dm) * rad);
  L += 0.658 * Math.sin(2*Dm * rad);
  L += 0.214 * Math.sin(2*Mm * rad);
  L += -0.186 * Math.sin(Ms * rad);
  L += -0.114 * Math.sin(2*F * rad);
  L = ((L % 360) + 360) % 360;
  const signIndex = Math.floor(L / 30);
  const signs = [
    { name: '牡羊座', emoji: '♈' }, { name: '牡牛座', emoji: '♉' }, { name: '双子座', emoji: '♊' },
    { name: '蟹座', emoji: '♋' }, { name: '獅子座', emoji: '♌' }, { name: '乙女座', emoji: '♍' },
    { name: '天秤座', emoji: '♎' }, { name: '蠍座', emoji: '♏' }, { name: '射手座', emoji: '♐' },
    { name: '山羊座', emoji: '♑' }, { name: '水瓶座', emoji: '♒' }, { name: '魚座', emoji: '♓' }
  ];
  return { ...signs[signIndex], approximate: isUnknownTime };
};

// テキスト整形
// ==========================================
const FormattedText = ({ text, className = '' }) => {
  if (!text) return null;

  // インライン記号を完全除去
  const stripInline = (str) => str
    .replace(/\*\*\*([^*]+)\*\*\*/g, '$1')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/\*\*\*/g, '').replace(/\*\*/g, '').replace(/\*/g, '')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/#/g, '')
    .trim();

  // 見出しの絵文字＋テキストからグラデーションカラーを決定
  const getHeadingStyle = (content) => {
    if (content.includes('1️⃣') || content.includes('エネルギー')) return { bg: 'from-orange-400 to-amber-400', light: 'bg-orange-50 border-orange-200' };
    if (content.includes('2️⃣') || content.includes('リーディング')) return { bg: 'from-violet-400 to-purple-500', light: 'bg-violet-50 border-violet-200' };
    if (content.includes('3️⃣') || content.includes('アクション') || content.includes('おすすめ')) return { bg: 'from-emerald-400 to-teal-500', light: 'bg-emerald-50 border-emerald-200' };
    if (content.includes('4️⃣') || content.includes('避け')) return { bg: 'from-rose-400 to-pink-500', light: 'bg-rose-50 border-rose-200' };
    if (content.includes('5️⃣') || content.includes('キーワード')) return { bg: 'from-sky-400 to-blue-500', light: 'bg-sky-50 border-sky-200' };
    if (content.includes('6️⃣') || content.includes('ラッキー')) return { bg: 'from-yellow-400 to-orange-400', light: 'bg-yellow-50 border-yellow-200' };
    return { bg: 'from-stone-400 to-stone-500', light: 'bg-stone-50 border-stone-200' };
  };

  const cleanAndFormat = (rawText) => {
    const lines = rawText.split('\n');
    const result = [];

    lines.forEach((line) => {
      const headingMatch = line.match(/^#{1,6}\s*(.+)$/);
      if (headingMatch) {
        const content = stripInline(headingMatch[1]);
        if (content) result.push({ type: 'heading', content });
        return;
      }
      // ラッキー要素などの「ラベル → 値」形式
      const arrowMatch = line.match(/^(.+?)→(.+)$/);
      if (arrowMatch && !line.startsWith('#')) {
        const label = stripInline(arrowMatch[1]);
        const value = stripInline(arrowMatch[2]);
        if (label && value) { result.push({ type: 'arrow', label, value }); return; }
      }
      const bulletMatch = line.match(/^[\*\-]\s+(.+)$/);
      if (bulletMatch) {
        const content = stripInline(bulletMatch[1]);
        if (content) result.push({ type: 'bullet', content });
        return;
      }
      const numberedMatch = line.match(/^\d+\.\s+(.+)$/);
      if (numberedMatch) {
        const content = stripInline(numberedMatch[1]);
        if (content) result.push({ type: 'bullet', content });
        return;
      }
      if (line.trim() === '') {
        result.push({ type: 'empty' });
        return;
      }
      const content = stripInline(line);
      if (content === '') {
        result.push({ type: 'empty' });
      } else {
        result.push({ type: 'text', content });
      }
    });
    return result;
  };

  const lines = cleanAndFormat(text);

  return (
    <div className={`space-y-2 ${className}`}>
      {lines.map((line, idx) => {
        if (line.type === 'empty') return <div key={idx} className="h-2"/>;

        if (line.type === 'heading') {
          const style = getHeadingStyle(line.content);
          return (
            <div key={idx} className="pt-4 pb-1">
              <div className={`inline-flex items-center gap-2 px-4 py-2 rounded-2xl bg-gradient-to-r ${style.bg} shadow-md`}>
                <span className="text-white font-bold text-[15px] leading-snug">{line.content}</span>
              </div>
            </div>
          );
        }

        if (line.type === 'arrow') {
          return (
            <div key={idx} className="flex items-center gap-2 pl-2">
              <span className="text-[13px] font-bold text-stone-500 flex-shrink-0">{line.label}</span>
              <span className="text-orange-400 font-bold flex-shrink-0">→</span>
              <span className="text-[14px] font-bold text-stone-800">{line.value}</span>
            </div>
          );
        }

        if (line.type === 'bullet') {
          return (
            <div key={idx} className="flex gap-3 items-start pl-2 pr-1">
              <span className="flex-shrink-0 w-5 h-5 rounded-full bg-gradient-to-br from-orange-400 to-pink-400 flex items-center justify-center mt-[3px]">
                <span className="text-white text-[10px] font-bold">✓</span>
              </span>
              <p className="text-[14px] leading-[1.9] text-stone-700 flex-1">{line.content}</p>
            </div>
          );
        }

        return (
          <p key={idx} className="text-[14px] leading-[2.0] text-stone-700 px-1">
            {line.content}
          </p>
        );
      })}
    </div>
  );
};

  const handleMackeyImageUpload = (which, e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { alert('画像ファイルを選択してください'); return; }
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = async () => {
        const maxWidth = 800;
        const scale = Math.min(maxWidth / img.width, 1);
        const w = img.width * scale, h = img.height * scale;
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        // Supabaseに保存（全端末に反映）
        const ok = await saveSettingToSupabase(`image_${which}`, dataUrl);

          alert(`画像${which}を保存しました ✨\n全端末に反映されます！`);
        } else {

        }
      };
      img.onerror = () => alert('画像の読み込みに失敗しました');
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };

                          </div>
                        </div>
                        <p className="text-[10px] text-center mt-2 text-stone-500">今日の干支: {readingData.todayDayPillar.stem}{readingData.todayDayPillar.branch}</p>
                      </div>
                    )}
                    {detailModal === 'sanmeigaku' && (
                      <div className="mb-4 p-4 bg-gradient-to-br from-rose-50 to-pink-50 rounded-2xl border-2 border-rose-200 text-center">
                        <p className="text-xs font-bold text-rose-600 mb-2 tracking-widest">⭐ あなたの主星</p>
                        <p className="text-3xl mb-1">{readingData.mainStar.element}</p>
                        <p className="text-xl font-bold font-serif-jp text-stone-800">{readingData.mainStar.name}</p>
                        <p className="text-[10px] text-stone-500 mt-1">{readingData.mainStar.meaning}</p>
                      </div>
                    )}
                    {detailModal === 'horoscope' && (
                      <div className="mb-4 p-4 bg-gradient-to-br from-orange-50 to-yellow-50 rounded-2xl border-2 border-orange-200">
                        <div className="grid grid-cols-2 gap-2 text-center">
                          <div className="bg-white/80 p-3 rounded-xl">
                            <p className="text-[10px] font-bold text-orange-600 mb-1">☀️ 太陽星座</p>
                            <p className="text-3xl">{readingData.sunSign.emoji}</p>
                            <p className="text-base font-bold font-serif-jp text-stone-800">{readingData.sunSign.name}</p>
                          </div>
                          <div className="bg-white/80 p-3 rounded-xl">
                            <p className="text-[10px] font-bold text-blue-500 mb-1">🌙 月星座</p>
                            <p className="text-3xl">{readingData.moonSign.emoji}</p>
                            <p className="text-base font-bold font-serif-jp text-stone-800">{readingData.moonSign.name}</p>
                            {readingData.moonSign.approximate && <p className="text-[8px] text-stone-400 mt-0.5">※出生時間不明のため概算</p>}
                          </div>
                        </div>
                      </div>
                    )}
                    {detailModal === 'numerology' && (
                      <div className="mb-4 p-4 bg-gradient-to-br from-pink-50 to-rose-50 rounded-2xl border-2 border-pink-200">
                        <p className="text-xs font-bold text-pink-600 mb-2 tracking-widest text-center">🔢 あなたの数秘</p>
                        <div className="grid grid-cols-3 gap-2 text-center">
                          <div className="bg-white/70 p-2 rounded-xl">
                            <p className="text-[9px] text-stone-500">本質</p>
                            <p className="text-2xl font-bold text-pink-600">{readingData.numerology.lifePath}</p>
                          </div>
                          <div className="bg-white/70 p-2 rounded-xl">
                            <p className="text-[9px] text-stone-500">今年</p>
                            <p className="text-2xl font-bold text-orange-500">{readingData.numerology.personalYear}</p>
                          </div>
                          <div className="bg-white/70 p-2 rounded-xl">
                            <p className="text-[9px] text-stone-500">今日</p>
                            <p className="text-2xl font-bold text-rose-500">{readingData.numerology.personalDay}</p>
                          </div>
                        </div>
                        <p className="text-[10px] text-center mt-2 text-stone-500">本質: {numerologyMeanings[readingData.numerology.lifePath]?.keyword}</p>
                      </div>
                    )}
                    <FormattedText text={detailContent}/>
                  </>
                )}
              </div>
              <div className="p-4 border-t-2 border-orange-100">
                <button onClick={() => setDetailModal(null)}
                  className="w-full py-3 rounded-2xl font-bold text-white shadow-md"
                  style={{background: 'linear-gradient(135deg, #fb923c, #ec4899)'}}>閉じる</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
